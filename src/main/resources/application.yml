spring:
  application:
    name: TaskFlow API
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskflow_db}
    username: ${DB_USERNAME:dev_user}
    password: ${DB_PASSWORD:devpass123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace
application:
  security:
    jwt:
      # HS256 key (64+ chars) — override via JWT_SECRET env variable in production
      secret-key: ${JWT_SECRET:4A614E645267556B58703273357638792F423F4528482B4D6251655468576D5A}
      expiration: 86400000 # 24 horas en ms
      refresh-expiration: 604800000 # 7 dias en ms